<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');
        body { font-family: 'DM Sans', sans-serif; background: #F7F6F2; padding: 20px; display: flex; justify-content: center; }
        .card { background: #fff; border-radius: 20px; padding: 30px; max-width: 500px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; }
        .icon-finish { font-size: 50px; margin-bottom: 20px; }
        .check-list { text-align: left; background: #F9FAFB; padding: 20px; border-radius: 12px; margin: 20px 0; }
        .check-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; font-size: 14px; }
        input[type="checkbox"] { accent-color: #1D9E75; width: 18px; height: 18px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-finish">🏁</div>
        <h1>Clôturer sur AirSaaS</h1>
        <div class="check-list">
            <div class="check-item"><input type="checkbox"> Passer le statut à "Terminé"</div>
            <div class="check-item"><input type="checkbox"> Saisir le bilan final (KPIs)</div>
            <div class="check-item"><input type="checkbox"> Archiver les documents clés</div>
            <div class="check-item"><input type="checkbox"> Libérer les ressources CoProj</div>
        </div>
        <p style="font-size: 12px; color: #999;">Un projet bien clôturé permet d'alimenter les statistiques du Comex !</p>
    </div>
</body>
</html>
