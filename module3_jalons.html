<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');
        body { font-family: 'DM Sans', sans-serif; background: #F8FAFC; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: #fff; border-radius: 16px; padding: 35px; max-width: 650px; width: 100%; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 6px solid #6366F1; }
        
        .methodo-box { background: #F5F3FF; border-radius: 12px; padding: 20px; margin-bottom: 25px; border-left: 5px solid #6366F1; }
        .methodo-box h3 { margin: 0 0 10px 0; color: #4338CA; font-size: 16px; }
        .methodo-box p { margin: 0; font-size: 14px; color: #4338CA; line-height: 1.5; }

        .exercise-title { font-size: 18px; font-weight: 700; color: #1E293B; margin-bottom: 20px; }
        
        .item-list { display: grid; gap: 12px; }
        .item { border: 2px solid #E2E8F0; border-radius: 12px; padding: 18px; cursor: pointer; transition: 0.3s; background: white; position: relative; }
        .item:hover { border-color: #6366F1; background: #F8FAFC; }
        .item.selected-ok { border-color: #10B981; background: #F0FDF4; }
        .item.selected-ko { border-color: #EF4444; background: #FEF2F2; }

        .explanation { display: none; margin-top: 12px; font-size: 13px; line-height: 1.5; font-weight: 500; animation: fadeIn 0.3s; }
        .tag { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; margin-bottom: 8px; font-weight: 700; background: #E2E8F0; color: #475569; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
